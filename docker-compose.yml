services:
  db:
    image: postgres:16
    container_name: vf_cmdb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vfcmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vfcmdb}
      POSTGRES_DB: ${POSTGRES_DB:-vfcmdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vfcmdb} -d ${POSTGRES_DB:-vfcmdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cmdb

  backend:
    build: ./backend
    container_name: vf_cmdb_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vfcmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vfcmdb}
      POSTGRES_DB: ${POSTGRES_DB:-vfcmdb}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      API_PREFIX: ${API_PREFIX:-/api/v1}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - cmdb

  frontend:
    build: ./frontend
    container_name: vf_cmdb_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    networks:
      - cmdb

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vf_cmdb_pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@virtualfactor.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
    networks:
      - cmdb

volumes:
  pgdata:
  pgadmin:

networks:
  cmdb:
    driver: bridge
