# Automated dependency update PRs — keeps the stack patched with minimal effort.
version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "deps(backend)"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "deps(frontend)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(ci)"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
