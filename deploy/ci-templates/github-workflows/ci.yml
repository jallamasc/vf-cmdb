name: CI

# Continuous code review: runs on every push and pull request against the
# main/master branches. Lints, type-checks and builds both the backend and
# frontend, and validates that the container images build cleanly.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  backend:
    name: Backend (lint · type · import)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check app || true   # advisory on first adoption; see ruff.toml

      - name: Ruff format check
        run: ruff format --check app || true

      - name: Byte-compile all modules (syntax gate)
        run: python -m compileall -q app

      - name: Import sanity check
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: vfcmdb
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: vfcmdb
        run: python -c "import app.main; import app.models; import app.crud; print('backend imports OK')"

  # -------------------------------------------------------------------------
  frontend:
    name: Frontend (type-check · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # -------------------------------------------------------------------------
  containers:
    name: Container images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Containerfile -t vf_cmdb_backend:ci ./backend

      - name: Build frontend image
        run: docker build -f frontend/Containerfile -t vf_cmdb_frontend:ci ./frontend

  # -------------------------------------------------------------------------
  shellcheck:
    name: Shell scripts lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck -S warning deploy-podman.sh deploy/scripts/*.sh || true
