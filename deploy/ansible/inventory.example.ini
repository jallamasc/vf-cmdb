# Virtualfactor IT CMDB — Ansible inventory (copy to inventory.ini and edit)
#
# The 'cmdb' group must contain exactly the VM(s) you want to deploy to.
# ansible_user is the NON-root app user that owns the rootless containers.

[cmdb]
cmdb-vm ansible_host=192.168.1.50

[cmdb:vars]
ansible_user=vfadmin
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
# Recommended: pin the UI origin instead of "*"
# cors_origins=http://192.168.1.50:8080
