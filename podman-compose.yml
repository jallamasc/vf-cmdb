# ---------------------------------------------------------------------------
# Virtualfactor IT CMDB — Podman Compose stack
#
# Run with either:
#   podman compose up -d          (podman v4.7+ built-in compose)
#   podman-compose up -d          (the podman-compose Python tool)
#
# Notes for Podman:
#   * Volume mounts use the ":Z" suffix so SELinux (Fedora/RHEL/Rocky) relabels
#     them for the container. On non-SELinux hosts (Debian/Ubuntu) the ":Z" is
#     harmless and simply ignored.
#   * Builds reference "Containerfile" (Podman's native name) explicitly.
#   * Works rootless — all published host ports are >1024.
#   * For always-on production start-up, prefer the Quadlet units in
#     deploy/quadlet/ (systemd-managed). See README.
# ---------------------------------------------------------------------------
services:
  db:
    image: docker.io/library/postgres:16
    container_name: vf_cmdb_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vfcmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vfcmdb}
      POSTGRES_DB: ${POSTGRES_DB:-vfcmdb}
    volumes:
      - pgdata:/var/lib/postgresql/data:Z
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vfcmdb} -d ${POSTGRES_DB:-vfcmdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cmdb

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    image: localhost/vf_cmdb_backend:latest
    container_name: vf_cmdb_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vfcmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vfcmdb}
      POSTGRES_DB: ${POSTGRES_DB:-vfcmdb}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      API_PREFIX: ${API_PREFIX:-/api/v1}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - cmdb

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    image: localhost/vf_cmdb_frontend:latest
    container_name: vf_cmdb_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    networks:
      - cmdb

  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    container_name: vf_cmdb_pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@virtualfactor.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin:/var/lib/pgadmin:Z
    networks:
      - cmdb

volumes:
  # Explicit, fixed volume names so podman-compose does NOT auto-prefix with the
  # project name. This keeps the compose path and the Quadlet path (deploy/quadlet/)
  # on the SAME physical volumes, preventing the dash/underscore divergence that
  # produces duplicate/orphan volumes and the "more than one result for volume
  # name" crash.
  pgdata:
    name: vf-cmdb_pgdata
  pgadmin:
    name: vf-cmdb_pgadmin

networks:
  cmdb:
    driver: bridge
